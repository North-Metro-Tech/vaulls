[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vaulls"
version = "0.1.0"
description = "Value-Wall Monetisation Layer for MCP Tools using x402 protocol"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "python-dotenv>=1.0.0",
    "x402[fastapi,evm]>=2.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
